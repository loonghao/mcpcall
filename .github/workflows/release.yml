name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-binaries:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mcpcall-linux-x86_64
            binary: mcpcall
          - os: ubuntu-24.04-arm
            artifact: mcpcall-linux-aarch64
            binary: mcpcall
          - os: windows-latest
            artifact: mcpcall-windows-x86_64.exe
            binary: mcpcall.exe
          - os: macos-15-intel
            artifact: mcpcall-macos-x86_64
            binary: mcpcall
          - os: macos-15
            artifact: mcpcall-macos-aarch64
            binary: mcpcall
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - uses: loonghao/vx@v0.8.36
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ runner.os }}-${{ runner.arch }}
          shared-key: release-${{ runner.os }}-${{ runner.arch }}
      - name: Build
        run: vx just build
      - name: Stage binary
        shell: bash
        run: cp target/release/${{ matrix.binary }} ${{ matrix.artifact }}
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} ${{ matrix.artifact }} --clobber

  build-skill:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: loonghao/vx@v0.8.36
        with:
          cache: false
      - name: Package skill
        run: vx just skill-zip
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} mcpcall-skill.zip --clobber
